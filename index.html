<!DOCTYPE html>
<html class="light" lang="pt-BR">

<head>
<link rel="manifest" href="manifest.json">

<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

<title>Livro de Cobranças - Gestão Financeira</title>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

<style>
body{
font-family:Inter,sans-serif;
background:#f7f9fb;
margin:0;
padding:20px;
}

table{
width:100%;
border-collapse:collapse;
background:#fff;
}

th,td{
border:1px solid #ddd;
padding:10px;
text-align:left;
}

th{
background:#1e293b;
color:#fff;
}

button{
padding:10px 15px;
border:none;
background:#1e293b;
color:#fff;
cursor:pointer;
border-radius:5px;
}

input{
width:100%;
padding:8px;
border:1px solid #ccc;
border-radius:4px;
}
</style>
</head>

<body>

<h1>Controle de Cobranças</h1>

<button onclick="addRow()">Adicionar Cliente</button>

<br><br>

<table>
<thead>
<tr>
<th>#</th>
<th>Nome</th>
<th>Aquisição</th>
<th>Valor</th>
<th>Data Cobrança</th>
<th>Dias Atraso</th>
<th>Juros 20%</th>
<th>Total</th>
<th>Ações</th>
</tr>
</thead>

<tbody id="ledgerBody"></tbody>
</table>

<script>

const STORAGE_KEY = 'billing_ledger_data';

let ledgerData = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

const ledgerBody = document.getElementById('ledgerBody');

function formatCurrency(value){
return new Intl.NumberFormat('pt-BR',{
style:'currency',
currency:'BRL'
}).format(value || 0);
}

function calculateMetrics(row){

const valor = parseFloat(row.valorOriginal) || 0;

const juros = valor * 0.20;

let dias = 0;

if(row.dataCobranca){

const today = new Date();

const cobranca = new Date(row.dataCobranca);

dias = Math.floor((today - cobranca) / (1000 * 60 * 60 * 24));

if(dias < 0){
dias = 0;
}

}

const total = valor + juros;

return {
dias,
juros,
total
};

}

function renderTable(){

ledgerBody.innerHTML = '';

ledgerData.forEach((row,index)=>{

const metrics = calculateMetrics(row);

const tr = document.createElement('tr');

tr.innerHTML = `
<td>${index+1}</td>

<td>
<input type="text"
value="${row.nome || ''}"
oninput="updateRow(${row.id},'nome',this.value)">
</td>

<td>
<input type="text"
value="${row.aquisicao || ''}"
oninput="updateRow(${row.id},'aquisicao',this.value)">
</td>

<td>
<input type="number"
value="${row.valorOriginal || ''}"
oninput="updateRow(${row.id},'valorOriginal',this.value)">
</td>

<td>
<input type="date"
value="${row.dataCobranca || ''}"
onchange="updateRow(${row.id},'dataCobranca',this.value)">
</td>

<td>${metrics.dias}</td>

<td>${formatCurrency(metrics.juros)}</td>

<td>${formatCurrency(metrics.total)}</td>

<td>
<button onclick="deleteRow(${row.id})">Excluir</button>
</td>
`;

ledgerBody.appendChild(tr);

});

localStorage.setItem(STORAGE_KEY,JSON.stringify(ledgerData));

}

function addRow(){

const hoje = new Date();

const proximoMes = new Date();

proximoMes.setMonth(proximoMes.getMonth()+1);

const dataFormatada = proximoMes.toISOString().split('T')[0];

ledgerData.push({
id:Date.now(),
nome:'',
aquisicao:'',
valorOriginal:0,
dataCobranca:dataFormatada
});

renderTable();

}

function updateRow(id,field,value){

const index = ledgerData.findIndex(r=>r.id===id);

if(index !== -1){

ledgerData[index][field] = value;

renderTable();

}

}

function deleteRow(id){

ledgerData = ledgerData.filter(r=>r.id !== id);

renderTable();

}

renderTable();

</script>

<script>
if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('/sw.js');
}
</script>

</body>
</html>
